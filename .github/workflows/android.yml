name: Android Build

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract Android project
        run: unzip -q VideoBackgroundRemoval.zip -d project

      - name: Find extracted directory
        id: projectdir
        run: |
          DIR=$(find project -name gradlew -type f | head -n 1 | xargs dirname)
          echo "dir=$DIR" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant Gradle permission
        run: chmod +x "${{ steps.projectdir.outputs.dir }}/gradlew"

      - name: Build Debug APK
        run: |
          cd "${{ steps.projectdir.outputs.dir }}"
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: |
            project/**/build/outputs/apk/**/*.apk
